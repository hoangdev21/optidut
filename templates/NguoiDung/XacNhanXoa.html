{% extends 'base.html' %}
{% block title %}Xóa tài khoản - OptiDUT{% endblock %}
{% block content %}
<div class="confirm-box">
    <h2>⚠ Xác nhận xóa</h2>
    <p>Bạn có chắc chắn muốn xóa tài khoản <strong>{{ nguoi_dung.ho_ten }}</strong> ({{ nguoi_dung.username }})?</p>
    <form method="post">
        {% csrf_token %}
        <div class="confirm-actions">
            <button type="submit" class="btn btn-danger">Xóa</button>
            <a href="{% url 'danh_sach_nguoi_dung' %}" class="btn btn-outline">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
